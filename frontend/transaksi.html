<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi | InvenTako</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Sembunyikan panah atas bawah di input number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-800">

    <header class="flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-white">
        <div class="text-3xl font-extrabold text-[#0044ff] tracking-tight">InvenTako</div>
        <div class="flex items-center gap-2 text-[#0044ff] cursor-pointer hover:text-blue-800 transition-colors" onclick="handleLogout()" title="Logout">
            <i data-lucide="circle-user" class="w-8 h-8" stroke-width="2"></i>
            <span class="text-xl font-medium">User</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-56 border-r border-slate-200 py-6 flex flex-col gap-1 bg-white">
            <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="barang.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="book-marked" class="w-5 h-5"></i>
                <span class="font-medium">Barang</span>
            </a>
            <a href="transaksi.html" class="flex items-center gap-3 px-6 py-3 bg-[#0044ff] text-white">
                <i data-lucide="banknote" class="w-5 h-5"></i>
                <span class="font-medium">Transaksi</span>
            </a>
            <a href="riwayat-transaksi.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="font-medium">Riwayat Transaksi</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="font-medium">Profil</span>
            </a>
        </aside>

        <main class="flex-1 p-6 overflow-y-auto flex gap-6">
            
            <div class="flex-1 flex flex-col gap-4">
                
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-black">Kasir Transaksi</h1>
                    <button class="flex items-center gap-2 text-slate-600 hover:text-black font-medium border border-slate-300 px-4 py-2 rounded-md bg-white">
                        <i data-lucide="history" class="w-4 h-4"></i> Riwayat
                    </button>
                </div>

                <div class="bg-white p-5 rounded-lg border border-slate-200 shadow-sm">
                    <label class="block font-bold text-black text-sm mb-2">Kode Barang / Barcode</label>
                    <div class="flex gap-3">
                        <div class="relative flex-1">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="barcode" class="w-5 h-5 text-slate-400"></i>
                            </div>
                            <input type="text" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#0044ff]" placeholder="Scan barcode atau ketik kode barang (Misal: 001)...">
                        </div>
                        <button class="bg-[#0044ff] hover:bg-blue-700 text-white px-6 py-2.5 rounded-md font-medium transition-colors">
                            + Tambah
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-slate-200 shadow-sm flex-1 flex flex-col overflow-hidden">
                    <div class="overflow-y-auto flex-1">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-slate-200 z-10">
                                <tr>
                                    <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Produk</th>
                                    <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Harga</th>
                                    <th class="py-3 px-4 font-semibold text-slate-800 text-sm text-center">Jumlah</th>
                                    <th class="py-3 px-4 font-semibold text-slate-800 text-sm">SubTotal</th>
                                    <th class="py-3 px-4 font-semibold text-slate-800 text-sm text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="border-b border-slate-100 hover:bg-slate-50">
                                    <td class="py-3 px-4 text-sm font-medium">Laptop Dell XPS 13</td>
                                    <td class="py-3 px-4 text-sm">Rp 15.000.000</td>
                                    <td class="py-3 px-4 text-sm">
                                        <div class="flex items-center justify-center gap-2">
                                            <button class="w-6 h-6 rounded bg-slate-200 text-slate-600 hover:bg-slate-300 flex items-center justify-center">-</button>
                                            <span class="w-6 text-center font-medium">1</span>
                                            <button class="w-6 h-6 rounded bg-slate-200 text-slate-600 hover:bg-slate-300 flex items-center justify-center">+</button>
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 text-sm font-semibold text-black">Rp 15.000.000</td>
                                    <td class="py-3 px-4 text-sm text-center">
                                        <button class="text-red-500 hover:text-red-700"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <div class="w-80 flex flex-col gap-4">
                
                <div class="bg-white p-5 rounded-lg border border-slate-200 shadow-sm flex flex-col flex-1">
                    <h2 class="text-lg font-bold text-black mb-4 border-b pb-2">Ringkasan Transaksi</h2>
                    
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm text-slate-500">Jumlah Item</span>
                        <span class="text-sm font-medium">1</span>
                    </div>
                    
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-lg font-bold text-black">Total</span>
                        <span class="text-xl font-bold text-[#0044ff]">Rp 15.000.000</span>
                    </div>

                    <div class="border-t pt-4 mt-auto">
                        <label class="block font-bold text-black text-sm mb-2">Uang Diterima (Tunai)</label>
                        <div class="relative mb-4">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="text-slate-500 font-medium text-sm">Rp</span>
                            </div>
                            <input type="number" class="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#0044ff] font-bold text-lg" placeholder="0">
                        </div>

                        <div class="flex justify-between items-center mb-6 bg-slate-100 p-3 rounded-md">
                            <span class="text-sm font-bold text-slate-600">Kembalian</span>
                            <span class="text-lg font-bold text-black">Rp 0</span>
                        </div>

                        <button class="w-full bg-[#0044ff] hover:bg-blue-700 text-white py-3.5 rounded-md font-bold text-base transition-colors flex items-center justify-center gap-2 shadow-md">
                            <i data-lucide="printer" class="w-5 h-5"></i> Simpan Transaksi
                        </button>
                        
                        <button class="w-full mt-2 text-slate-500 hover:text-red-500 font-medium py-2 text-sm transition-colors">
                            Batalkan Transaksi
                        </button>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
