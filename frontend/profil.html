<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil & Analitik | InvenTako</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-white min-h-screen flex flex-col text-slate-800">

    <header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-white shadow-sm">
        <div class="text-3xl font-extrabold text-[#0044ff] tracking-tight">InvenTako</div>
        <div class="flex items-center gap-2 text-[#0044ff] cursor-pointer hover:text-blue-800 transition-colors" onclick="confirmLogout()" title="Logout">
            <i data-lucide="log-out" class="w-6 h-6"></i>
            <span class="text-base font-semibold uppercase">Logout</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden pt-20">
        
        <aside class="fixed top-20 left-0 bottom-0 w-56 border-r border-slate-200 py-6 flex flex-col gap-1 bg-white z-40">
            <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="barang.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="book-marked" class="w-5 h-5"></i>
                <span class="font-medium">Barang</span>
            </a>
            <a href="transaksi.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="banknote" class="w-5 h-5"></i>
                <span class="font-medium">Kasir / Transaksi</span>
            </a>
            <a href="riwayat-transaksi.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="font-medium">Riwayat Transaksi</span>
            </a>
            <a href="profil.html" class="flex items-center gap-3 px-6 py-3 bg-[#0044ff] text-white">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="font-medium">Profil</span>
            </a>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto bg-white ml-56">
            
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-black">Profil dan Analitik Toko</h1>
            </div>

            <!-- Kartu Identitas -->
            <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 max-w-2xl mb-10">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-blue-50 border border-blue-200 rounded-full flex items-center justify-center text-[#0044ff]">
                        <i data-lucide="user" class="w-10 h-10" stroke-width="1.5"></i>
                    </div>
                    <div class="flex-1">
                        <h2 id="profileName" class="text-xl font-bold text-black uppercase">Admin</h2>
                        <p class="text-sm text-slate-500 mt-0.5 flex items-center gap-1.5">
                            <i data-lucide="shield-check" class="w-4 h-4 text-green-600"></i> Pemilik Toko
                        </p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                
                <!--Graf Pertumbuhan Pendapatan (Line Chart)-->
                <div class="bg-white p-6 border border-slate-200 rounded-lg shadow-sm lg:col-span-2">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
                        <h3 class="text-sm font-bold text-slate-600 uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="trending-up" class="w-4 h-4 text-[#0044ff]"></i> Pertumbuhan Pendapatan
                        </h3>
                        <div class="flex items-center gap-2">
                            <label for="weekFilter" class="text-xs font-semibold text-slate-500 uppercase">Filter:</label>
                            <select id="weekFilter" onchange="updateLineChart()" class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white text-slate-700 font-medium shadow-sm hover:border-[#0044ff] focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                <option value="current">Minggu Ini</option>
                                <option value="last">Minggu Lalu</option>
                                <option value="all">Semua Waktu</option>
                            </select>
                        </div>
                    </div>
                    <div class="relative h-72 w-full">
                        <canvas id="allTimeLineChart"></canvas>
                    </div>
                </div>

                <!-- Bar Chart Top 5 Barang Terlaku-->
                <div class="bg-white p-6 border border-slate-200 rounded-lg shadow-sm">
                    <h3 class="text-sm font-bold text-slate-600 mb-4 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="award" class="w-4 h-4 text-yellow-500"></i> 5 Barang Terlaris (Qty)
                    </h3>
                    <div class="relative h-64 w-full">
                        <canvas id="topItemsBarChart"></canvas>
                    </div>
                </div>

                <!-- Pie Chart: Waktu Transaksi -->
                <div class="bg-white p-6 border border-slate-200 rounded-lg shadow-sm">
                    <h3 class="text-sm font-bold text-slate-600 mb-4 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="clock" class="w-4 h-4 text-purple-500"></i> Jam Sibuk Transaksi
                    </h3>
                    <div class="relative h-64 w-full flex justify-center">
                        <canvas id="timePieChart"></canvas>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();
        window.addEventListener('load', () => lucide.createIcons());

        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username') || 'USER';

        let allTransactions = [];
        let lineChartInstance = null;

        if (!token) {
            window.location.href = 'login.html';
        }

        document.getElementById('profileName').textContent = username;

        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = 'login.html';
        }

        function confirmLogout() {
            const modal = document.getElementById('logoutConfirmModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function cancelLogout() {
            const modal = document.getElementById('logoutConfirmModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function fetchAnalytics() {
            try {
                const response = await fetch('http://localhost:3000/api/transactions/analytics/data', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();

                if (response.ok) {
                    renderCharts(data);
                }
            } catch (error) {
                console.error("Gagal memuat analitik:", error);
            }
        }

        function getWeekRange(date) {
            const d = new Date(date);
            const day = d.getDay(); 

            const diffToMonday = d.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(d.setDate(diffToMonday));
            monday.setHours(0, 0, 0, 0);
            
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);
            
            return { monday, sunday };
        }

        function formatDateRange(start, end) {
            const opt = { day: 'numeric', month: 'short' };
            const startStr = start.toLocaleDateString('id-ID', opt);
            const endStr = end.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            return `${startStr} - ${endStr}`;
        }

        function getCurrentWeekRange() {
            return getWeekRange(new Date());
        }

        function getLastWeekRange() {
            const today = new Date();
            const lastWeekDate = new Date(today.setDate(today.getDate() - 7));
            return getWeekRange(lastWeekDate);
        }

        function populateWeekFilter(transactions) {
            const select = document.getElementById('weekFilter');
            select.innerHTML = `
                <option value="current">Minggu Ini</option>
                <option value="last">Minggu Lalu</option>
                <option value="all">Semua Waktu</option>
            `;
            
            const weeks = [];
            const seen = new Set();
            
            transactions.forEach(trx => {
                const d = new Date(trx.tanggal);
                const { monday, sunday } = getWeekRange(d);
                const key = monday.toISOString().split('T')[0];
                
                if (!seen.has(key)) {
                    seen.add(key);
                    weeks.push({
                        key: key,
                        monday: monday,
                        sunday: sunday,
                        label: formatDateRange(monday, sunday)
                    });
                }
            });
            
            weeks.sort((a, b) => b.monday - a.monday);
            
            if (weeks.length > 0) {
                const optgroup = document.createElement('optgroup');
                optgroup.label = "Pilih Minggu Spesifik";
                
                weeks.forEach(wk => {
                    const opt = document.createElement('option');
                    opt.value = wk.key;
                    opt.textContent = wk.label;
                    optgroup.appendChild(opt);
                });
                
                select.appendChild(optgroup);
            }
        }

        function updateLineChart() {
            const filterValue = document.getElementById('weekFilter').value;
            let labels = [];
            let chartData = [];
            
            if (filterValue === 'all') {
                const dailyTotals = {};
                allTransactions.forEach(trx => {
                    const d = new Date(trx.tanggal);
                    const dateStr = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                    if (!dailyTotals[dateStr]) dailyTotals[dateStr] = 0;
                    dailyTotals[dateStr] += parseFloat(trx.total_belanja);
                });
                labels = Object.keys(dailyTotals);
                chartData = Object.values(dailyTotals);
            } else {
                let monday, sunday;
                if (filterValue === 'current') {
                    const range = getCurrentWeekRange();
                    monday = range.monday;
                    sunday = range.sunday;
                } else if (filterValue === 'last') {
                    const range = getLastWeekRange();
                    monday = range.monday;
                    sunday = range.sunday;
                } else {
                    monday = new Date(filterValue);
                    monday.setHours(0,0,0,0);
                    sunday = new Date(monday);
                    sunday.setDate(monday.getDate() + 6);
                    sunday.setHours(23,59,59,999);
                }
                
                const days = [];
                for (let i = 0; i < 7; i++) {
                    const date = new Date(monday);
                    date.setDate(monday.getDate() + i);
                    const dateStr = date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                    days.push({
                        dateStr: date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }),
                        label: dateStr,
                        total: 0
                    });
                }
                
                allTransactions.forEach(trx => {
                    const trxDate = new Date(trx.tanggal);
                    if (trxDate >= monday && trxDate <= sunday) {
                        const dateStr = trxDate.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                        const dayObj = days.find(d => d.dateStr === dateStr);
                        if (dayObj) {
                            dayObj.total += parseFloat(trx.total_belanja);
                        }
                    }
                });
                
                labels = days.map(d => d.label);
                chartData = days.map(d => d.total);
            }
            
            if (lineChartInstance) {
                lineChartInstance.destroy();
            }
            
            const lineCtx = document.getElementById('allTimeLineChart').getContext('2d');
            lineChartInstance = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Pendapatan (Rp)',
                        data: chartData,
                        borderColor: '#0044ff',
                        backgroundColor: 'rgba(0, 68, 255, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#0044ff',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function renderCharts(data) {
            allTransactions = data.transactions;
            
            //Pie Chart: Waktu Transaksi
            let pagi = 0, siang = 0, sore = 0, malam = 0;

            allTransactions.forEach(trx => {
                const d = new Date(trx.tanggal);
                
                // Group by Waktu (Jam)
                const hour = d.getHours();
                if (hour >= 5 && hour < 12) pagi++;        // 05:00 - 11:59
                else if (hour >= 12 && hour < 15) siang++; // 12:00 - 14:59
                else if (hour >= 15 && hour < 18) sore++;  // 15:00 - 17:59
                else malam++;                              // 18:00 - 04:59
            });

            populateWeekFilter(allTransactions);
            updateLineChart();

            const pieCtx = document.getElementById('timePieChart').getContext('2d');
            new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Pagi (05-12)', 'Siang (12-15)', 'Sore (15-18)', 'Malam (18-05)'],
                    datasets: [{
                        data: [pagi, siang, sore, malam],
                        backgroundColor: ['#fcd34d', '#f97316', '#f43f5e', '#3b82f6'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom' }
                    }
                }
            });

            // Bar Chart: Top 5 Barang Terlaris
            const barLabels = data.topItems.map(item => item.nama_barang);
            const barData = data.topItems.map(item => item.total_qty);

            const barCtx = document.getElementById('topItemsBarChart').getContext('2d');
            new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: barLabels,
                    datasets: [{
                        label: 'Terjual (Pcs)',
                        data: barData,
                        backgroundColor: '#10b981',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // Panggil saat halaman dibuka
        fetchAnalytics();
    </script>

    <div id="logoutConfirmModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                    <i data-lucide="log-out" class="w-6 h-6 text-red-600"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-900">Logout?</h2>
            </div>
            <p class="text-slate-600 mb-6">Apakah Anda yakin ingin keluar dari aplikasi?</p>
            <div class="flex gap-3">
                <button onclick="cancelLogout()" class="flex-1 px-4 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-900 font-semibold rounded-lg transition-colors">
                    Batal
                </button>
                <button onclick="handleLogout()" class="flex-1 px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                </button>
            </div>
        </div>
    </div>
</body>
</html>
