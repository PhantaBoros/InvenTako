<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Suppression: Per instructions, suppress nav for Transactional screens -->
<main class="flex-grow flex items-center justify-center p-6 sm:p-12">
<!-- Auth Container -->
<div class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Branding Anchor -->
<div class="text-center">
<h1 class="font-headline font-extrabold text-3xl tracking-tighter mb-2" style="color: #2E5BFF;">InvenTako</h1>
</div>
<!-- Main Register Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 sm:p-10 transition-all duration-300">
<header class="mb-8">
<h2 class="font-headline font-bold text-2xl text-on-surface tracking-tight">Create Account</h2>
<p class="text-on-surface-variant text-sm mt-1">Enter your details to initialize your ledger.</p>
</header>
<form class="flex flex-col gap-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">
                            Email
                        </label>
<input id="email" required class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 rounded-lg p-4 text-sm font-medium transition-all outline-none text-on-surface" placeholder="name@firm.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">
                            Password
                        </label>
<div class="relative">
<input id="password" required class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 rounded-lg p-4 text-sm font-medium transition-all outline-none text-on-surface" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action 1: Verification -->
<div class="pt-2">
<button class="w-full py-4 rounded-xl font-headline font-bold text-sm tracking-wide transition-transform active:scale-95 shadow-lg shadow-primary/10 text-surface-container-lowest" style="background-color: #2E5BFF;">Register Account</button>
</div>
<!-- Secondary Verification Section (Emphasized per prompt) -->
</form>
<!-- Footer Links -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                        Already have an account? 
                        <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-2" href="login.html">Sign In</a>
</p>
</div>
</div>
<!-- Global Footer Metadata -->
</div>
</main>
<!-- Decoration Element: Precision Line -->
<div class="fixed top-0 left-0 w-1 h-full bg-primary opacity-20"></div>
<div class="fixed top-0 right-0 w-1 h-full bg-primary opacity-20"></div>
<script>
    async function handleRegister(event) {
        event.preventDefault(); // Mencegah halaman refresh
        
        // Ambil nilai dari kotak input dan hilangkan spasi kosong di awal/akhir (.trim())
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        // CEK KEKOSONGAN (SATPAM FRONTEND)
        if (!email || !password) {
            alert('⚠️ Peringatan: Email dan Password wajib diisi!');
            return; 
        }

        // CEK FORMAT GMAIL (SATPAM BARU)
        if (!email.endsWith('@gmail.com')) {
            alert('⚠️ Peringatan: Harus menggunakan email @gmail.com!');
            return;
        }

        try {
            // Kirim data ke backend Node.js
            const response = await fetch('http://localhost:3000/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await response.json();

            // Cek apakah ada error (misal email sudah dipakai)
            if (!response.ok) {
                alert('❌ Gagal: ' + data.message);
            } else {
                alert('✅ Sukses: ' + data.message); 
                window.location.href = 'login.html'; 
            }
        } catch (error) {
            alert('❌ Terjadi kesalahan pada server. Pastikan backend menyala!');
        }
    }

    const formRegister = document.querySelector('form');
    formRegister.onsubmit = handleRegister;
</script>
