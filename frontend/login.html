<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract Background Elements -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[60%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[60%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<!-- Main Branding -->
<div class="mb-12 text-center relative z-10">
<div class="flex items-center justify-center gap-3">
<span class="text-2xl font-extrabold tracking-tight text-primary font-headline">InvenTako</span>
</div>
</div>
<!-- Login Container -->
<main class="w-full max-w-md relative z-10">
<div class="surface-container-lowest rounded-xl p-8 shadow-[0_32px_64px_-12px_rgba(25,28,30,0.04)] border border-outline-variant/10">
<header class="mb-8">
<h1 class="text-3xl font-extrabold text-on-surface mb-2 font-headline">Sign In</h1>
<p class="text-on-surface-variant text-sm">Welcome back to your Inventory Management.</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase ml-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline" id="email" name="email" placeholder="name@gmail.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase" for="password">Password</label>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" id="remember" name="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium select-none" for="remember">Keep me signed in for 30 days</label>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 px-6 rounded-lg shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Access Atelier</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</form>
<footer class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    New to the InvenTako? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="register.html">Register for an account</a>
</p>
</footer>
</div>
<!-- Secondary Meta Navigation -->
</main>
<!-- Contextual Aesthetic Feature -->
<div class="hidden lg:block fixed bottom-12 right-12 w-64 h-64 opacity-20 pointer-events-none">
<div class="w-full h-full border border-primary/40 rounded-full flex items-center justify-center animate-pulse">
<div class="w-48 h-48 border border-primary/30 rounded-full flex items-center justify-center">
<div class="w-32 h-32 border border-primary/20 rounded-full"></div>
</div>
</div>
</div>
<script>
    async function handleLogin(event) {
        event.preventDefault(); // Mencegah halaman refresh
        
        // Ambil nilai dari kotak input
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        // CEK KEKOSONGAN
        if (!email || !password) {
            alert('⚠️ Peringatan: Email dan Password wajib diisi!');
            return;
        }

        try {
            // Kirim data ke backend Node.js
            const response = await fetch('http://localhost:3000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await response.json();

            // Cek apakah error (email/password salah)
            if (!response.ok) {
                alert('❌ Gagal: ' + data.message); // Pop-up error dari backend
            } else {
                alert('✅ ' + data.message); // Pop-up sukses
                
                // Simpan "tiket masuk" (token) di browser
                localStorage.setItem('token', data.token); 
                
                // Pindah ke halaman utama (Dashboard)
                window.location.href = 'index.html'; 
            }
        } catch (error) {
            alert('❌ Terjadi kesalahan pada server. Pastikan backend menyala!');
        }
    }

    // Sambungkan fungsi di atas ke tombol form
    const formLogin = document.querySelector('form');
    formLogin.onsubmit = handleLogin;
</script>
</body></html>
