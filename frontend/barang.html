<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barang | InvenTako</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-white min-h-screen flex flex-col text-slate-800">

    <!-- Navbar -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
        <div class="text-3xl font-extrabold text-[#0044ff] tracking-tight">InvenTako</div>
        <div class="flex items-center gap-2 text-[#0044ff] cursor-pointer hover:text-blue-800 transition-colors"
            onclick="handleLogout()" title="Logout">
            <i data-lucide="circle-user" class="w-8 h-8" stroke-width="2"></i>
            <span class="text-xl font-medium">User</span>
        </div>
    </header>

    <!-- Main Wrapper -->
    <div class="flex flex-1 overflow-hidden">

        <!-- Sidebar -->
        <aside class="w-56 border-r border-slate-200 py-6 flex flex-col gap-1">
            <a href="dashboard.html"
                class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="barang.html" class="flex items-center gap-3 px-6 py-3 bg-[#0044ff] text-white">
                <i data-lucide="book-marked" class="w-5 h-5"></i>
                <span class="font-medium">Barang</span>
            </a>
            <a href="transaksi.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="banknote" class="w-5 h-5"></i>
                <span class="font-medium">Transaksi</span>
            </a>
            <a href="riwayat-transaksi.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="font-medium">Riwayat Transaksi</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="font-medium">Profil</span>
            </a>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto bg-white">

            <!-- Top Cards -->
            <div class="flex gap-6 mb-8 w-2/3">
                <div
                    class="flex-1 p-5 border border-slate-200 rounded-lg shadow-sm bg-white flex flex-col justify-between">
                    <p class="text-slate-500 font-bold text-sm">Total Assets</p>
                    <p class="text-2xl font-bold text-black mt-1" id="totalAssets">0</p>
                </div>
                <div
                    class="flex-1 p-5 border border-slate-200 rounded-lg shadow-sm bg-white flex flex-col justify-between">
                    <p class="text-slate-500 font-bold text-sm">Valuation</p>
                    <p class="text-2xl font-bold text-black mt-1" id="totalValuation">Rp 0</p>
                </div>
            </div>

            <!-- Search and Action -->
            <div class="flex justify-between items-center mb-6 gap-4">
                <div class="relative flex-1 max-w-xl">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-5 w-5 text-slate-400"></i>
                    </div>
                    <input type="text" id="searchInput"
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-md leading-5 bg-white placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-1 focus:ring-[#0044ff] focus:border-[#0044ff] sm:text-sm shadow-sm"
                        placeholder="Cari barang (nama, code, kategory)....">
                </div>
                <button onclick="window.location.href='tambah-barang.html'"
                    class="bg-[#0044ff] hover:bg-blue-700 text-white px-5 py-2.5 rounded-md font-medium transition-colors shadow-sm flex items-center gap-1">
                    + Tambah Barang
                </button>
            </div>

            <!-- Table -->
            <div class="mb-4">
                <h2 class="text-[16px] font-bold text-black mb-3">Daftar Barang</h2>
                <div class="border border-slate-200 rounded-md bg-white shadow-sm overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-200 border-b border-slate-200">
                                <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Kode</th>
                                <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Nama Barang</th>
                                <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Kategori</th>
                                <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Harga</th>
                                <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Stok</th>
                                <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Status</th>
                                <th class="py-3 px-4 font-semibold text-slate-800 text-sm">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Items will be populated here by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="flex items-center justify-between text-sm text-slate-800 mt-6">
                <div id="paginationText">
                    Showing 0 entries
                </div>
                <div class="flex items-center gap-2 font-medium">
                    <button class="p-1 hover:bg-slate-100 rounded text-slate-400"><i data-lucide="chevron-left"
                            class="w-4 h-4"></i></button>
                    <button class="w-7 h-7 rounded bg-[#0044ff] text-white flex items-center justify-center">1</button>
                    <button class="p-1 hover:bg-slate-100 rounded"><i data-lucide="chevron-right"
                            class="w-4 h-4"></i></button>
                </div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();

        // Cek apakah user sudah login atau belum
        const token = localStorage.getItem('token');
        if (!token) {
            alert('Akses ditolak! Silakan login dulu.');
            window.location.href = 'login.html';
        }

        function handleLogout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
        
        let allItems =[];

        async function fetchItems() {
            try {
                const response = await fetch('http://localhost:3000/api/items', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        alert('Sesi kadaluarsa, silakan login kembali.');
                        handleLogout();
                    }
                    throw new Error('Gagal mengambil data barang');
                }

                const items = await response.json();
                allItems = items;
                renderItems(allItems);
            } catch (error) {
                console.error(error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="text-center py-4 text-red-500">Gagal memuat data. Pastikan server menyala.</td></tr>';
            }
        }

        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        }

        function renderItems(items) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            document.getElementById('paginationText').textContent = `Showing ${items.length} entries`;

            let totalValuation = 0;
            let totalAssets = items.length;

            if (items.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-slate-500">Belum ada barang yang ditambahkan.</td></tr>';
            } else {
                items.forEach(item => {
                    const harga = parseFloat(item.harga);
                    totalValuation += (harga * item.stok);

                    let statusBadge = '';
                    if (item.stok > 5) {
                        statusBadge = '<span class="bg-[#22c55e] text-white px-3 py-1 rounded text-xs font-medium">Tersedia</span>';
                    } else if (item.stok > 0) {
                        statusBadge = '<span class="bg-amber-500 text-white px-3 py-1 rounded text-xs font-medium">Menipis</span>';
                    } else {
                        statusBadge = '<span class="bg-red-600 text-white px-3 py-1 rounded text-xs font-medium">Habis</span>';
                    }

                    const row = `
                        <tr class="border-b border-slate-200 hover:bg-slate-50 transition-colors">
                            <td class="py-4 px-4 text-sm text-slate-800">${item.kode}</td>
                            <td class="py-4 px-4 text-sm text-slate-800">${item.nama}</td>
                            <td class="py-4 px-4 text-sm text-slate-800">${item.kategori}</td>
                            <td class="py-4 px-4 text-sm text-slate-800">${formatRupiah(harga)}</td>
                            <td class="py-4 px-4 text-sm text-slate-800">${item.stok}</td>
                            <td class="py-4 px-4 text-sm">${statusBadge}</td>
                            <td class="py-4 px-4 text-sm flex items-center gap-3">
                                <button onclick="window.location.href='edit-barang.html?id=${item.id}'" class="text-slate-700 hover:text-black"><i data-lucide="edit" class="w-4 h-4"></i></button>
                                <button onclick="showDeletePopup(${item.id})" class="text-red-500 hover:text-red-700"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
                lucide.createIcons();
            }

            document.getElementById('totalAssets').textContent = totalAssets;
            document.getElementById('totalValuation').textContent = formatRupiah(totalValuation);
        }
        // Initialize
        fetchItems();

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase(); // Ambil teks yang diketik dan ubah ke huruf kecil
            
            // Filter array allItems berdasarkan nama, kode, atau kategori
            const filteredItems = allItems.filter(item => {
                return (
                    item.nama.toLowerCase().includes(searchTerm) ||
                    item.kode.toLowerCase().includes(searchTerm) ||
                    item.kategori.toLowerCase().includes(searchTerm)
                );
            });

            // Render ulang tabel dengan data yang sudah difilter
            renderItems(filteredItems);
        });

        // Delete Logic
        let itemToDeleteId = null;

        function showDeletePopup(id) {
            itemToDeleteId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.getElementById('deleteModal').classList.add('flex');
        }

        function hideDeletePopup() {
            itemToDeleteId = null;
            document.getElementById('deleteModal').classList.add('hidden');
            document.getElementById('deleteModal').classList.remove('flex');
        }

        async function confirmDelete() {
            if (!itemToDeleteId) return;
            try {
                const response = await fetch(`http://localhost:3000/api/items/${itemToDeleteId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    hideDeletePopup();
                    document.getElementById('searchInput').value = '';
                    fetchItems(); // Reload table
                } else {
                    const res = await response.json();
                    alert(res.message || 'Gagal menghapus barang.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan pada server saat menghapus barang.');
            }
        }
    </script>

    <!-- Delete Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black/30 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl">
            <h3 class="text-lg font-bold text-black mb-2">Hapus Barang</h3>
            <p class="text-slate-600 text-sm mb-6">Tindakan ini tidak dapat dibatalkan. Barang akan dihapus secara permanen dari sistem.</p>
            <div class="flex items-center justify-end gap-3">
                <button onclick="hideDeletePopup()" class="px-5 py-2 border border-slate-300 rounded-md text-sm font-medium text-black hover:bg-slate-50 transition-colors">Batal</button>
                <button onclick="confirmDelete()" class="px-5 py-2 bg-[#ff0000] rounded-md text-sm font-medium text-white hover:bg-red-700 transition-colors">Hapus</button>
            </div>
        </div>
    </div>
</body>

</html>
